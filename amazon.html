<body class="insecure">
  <!-- SSL 安全警告横幅（演示防范SSL绕过意识） -->

  <script>
    // ==================== 安全检测：SSL 绕过防范 ====================
    (function() {
      // 检测当前协议，如果非HTTPS且非本地文件，显示警告（演示SSL剥离攻击意识）
      const isSecure = window.location.protocol === 'https:' || window.location.protocol === 'file:';
      if (!isSecure) {
        document.body.classList.add('insecure');
      } else {
        document.body.classList.remove('insecure');
      }
      // 注意：实际生产环境中，应强制使用HTTPS并设置HSTS头，此处仅为前端演示。
    })();

    // ==================== 工具函数：XSS 防护（输出编码） ====================
    /**
     * 转义HTML特殊字符，防止XSS注入
     * 所有用户输入在显示到HTML前，必须经过此函数处理
     */
    function escapeHtml(str) {
      if (typeof str !== 'string') return str;
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /**
     * 安全的设置元素的文本内容（使用textContent，杜绝innerHTML注入）
     */
    function safeSetText(element, text) {
      if (element) {
        element.textContent = text;
      }
    }

    /**
     * 输入验证：移除潜在危险字符（<, >, ", ', & 等），但保留常用标点
     * 用于客户端初步过滤，实际项目仍需后端验证
     */
    function sanitizeInput(input) {
      if (typeof input !== 'string') return '';
      // 移除HTML标签相关的尖括号和引号编码
      return input.replace(/[<>&"']/g, function(m) {
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '&') return '&amp;';
        if (m === '"') return '&quot;';
        if (m === "'") return '&#39;';
        return m;
      });
    }

    // ==================== 商品数据 ====================
    const products = [
      { id: 1, title: '无线蓝牙耳机 降噪版 2025 新款', price: 299.99, rating: 4.5, img: 'https://picsum.photos/seed/headphone/300/200' },
      { id: 2, title: '智能手表 Ultra 系列 运动健康监测', price: 899.00, rating: 4.7, img: 'https://picsum.photos/seed/watch/300/200' },
      { id: 3, title: '便携式笔记本电脑 15.6寸 轻薄本', price: 4299.00, rating: 4.3, img: 'https://picsum.photos/seed/laptop/300/200' },
      { id: 4, title: '4K超高清投影仪 家庭影院', price: 1599.99, rating: 4.6, img: 'https://picsum.photos/seed/projector/300/200' },
      { id: 5, title: '机械键盘 RGB 背光 青轴', price: 249.00, rating: 4.4, img: 'https://picsum.photos/seed/keyboard/300/200' },
      { id: 6, title: '无线鼠标 人体工学设计 静音', price: 129.00, rating: 4.2, img: 'https://picsum.photos/seed/mouse/300/200' },
      { id: 7, title: '智能手机 5G 全网通 128GB', price: 1999.00, rating: 4.8, img: 'https://picsum.photos/seed/phone/300/200' },
      { id: 8, title: '电子书阅读器 墨水屏 6英寸', price: 699.00, rating: 4.5, img: 'https://picsum.photos/seed/ereader/300/200' },
    ];

    // ==================== 购物车状态 ====================
    let cart = [];

    // ==================== 渲染商品列表 ====================
    function renderProducts(filterText = '') {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = '';
      const filtered = products.filter(p => 
        p.title.toLowerCase().includes(filterText.toLowerCase())
      );
      filtered.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        // 使用安全的方式构建HTML（由于内容是静态的，但图片src来自可信源，标题使用textContent）
        card.innerHTML = `
          <div class="product-img">
            <img src="${escapeHtml(product.img)}" alt="${escapeHtml(product.title)}" loading="lazy">
          </div>
          <div class="product-info">
            <div class="product-title">${escapeHtml(product.title)}</div>
            <div class="product-rating">
              ${'★'.repeat(Math.floor(product.rating))}${'☆'.repeat(5 - Math.floor(product.rating))} 
              <span style="color:#007185;">${product.rating}</span>
            </div>
            <div class="product-price"><small>¥</small>${product.price.toFixed(2)}</div>
            <button class="add-to-cart-btn" data-id="${product.id}">
              <i class="fas fa-cart-plus"></i> 加入购物车
            </button>
          </div>
        `;
        grid.appendChild(card);
      });

      // 绑定加入购物车事件
      document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const id = parseInt(this.dataset.id);
          addToCart(id);
        });
      });
    }

    // ==================== 购物车操作 ====================
    function addToCart(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;
      const existing = cart.find(item => item.id === productId);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({
          id: product.id,
          title: product.title,
          price: product.price,
          quantity: 1
        });
      }
      updateCartUI();
      // 动画反馈
      animateCartIcon();
    }

    function removeFromCart(productId) {
      cart = cart.filter(item => item.id !== productId);
      updateCartUI();
    }

    function updateQuantity(productId, delta) {
      const item = cart.find(item => item.id === productId);
      if (!item) return;
      item.quantity += delta;
      if (item.quantity <= 0) {
        removeFromCart(productId);
      }
      updateCartUI();
    }

    function updateCartUI() {
      const cartItemsContainer = document.getElementById('cartItems');
      const cartCount = document.getElementById('cartCount');
      const totalPriceSpan = document.getElementById('totalPrice');
      const cartTotalDiv = document.getElementById('cartTotal');
      const checkoutBtn = document.getElementById('checkoutBtn');

      // 计算总数量和总价
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      const totalPrice = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

      cartCount.textContent = totalItems;
      totalPriceSpan.textContent = totalPrice.toFixed(2);

      if (cart.length === 0) {
        cartItemsContainer.innerHTML = '<div class="empty-cart">您的购物车是空的</div>';
        cartTotalDiv.style.display = 'none';
        checkoutBtn.disabled = true;
      } else {
        cartItemsContainer.innerHTML = '';
        cart.forEach(item => {
          const itemDiv = document.createElement('div');
          itemDiv.className = 'cart-item';
          // 使用安全方式构建，标题转义
          itemDiv.innerHTML = `
            <span class="cart-item-title">${escapeHtml(item.title)}</span>
            <span class="cart-item-price">¥${(item.price * item.quantity).toFixed(2)}</span>
            <div class="cart-item-quantity">
              <button class="qty-minus" data-id="${item.id}">-</button>
              <span>${item.quantity}</span>
              <button class="qty-plus" data-id="${item.id}">+</button>
            </div>
            <span class="remove-item" data-id="${item.id}"><i class="fas fa-trash-alt"></i></span>
          `;
          cartItemsContainer.appendChild(itemDiv);
        });

        // 绑定事件
        document.querySelectorAll('.qty-minus').forEach(btn => {
          btn.addEventListener('click', function(e) {
            const id = parseInt(this.dataset.id);
            updateQuantity(id, -1);
          });
        });
        document.querySelectorAll('.qty-plus').forEach(btn => {
          btn.addEventListener('click', function(e) {
            const id = parseInt(this.dataset.id);
            updateQuantity(id, 1);
          });
        });
        document.querySelectorAll('.remove-item').forEach(btn => {
          btn.addEventListener('click', function(e) {
            const id = parseInt(this.dataset.id);
            removeFromCart(id);
          });
        });

        cartTotalDiv.style.display = 'block';
        checkoutBtn.disabled = false;
      }
    }

    function animateCartIcon() {
      const icon = document.getElementById('cartIcon');
      icon.classList.add('animate');
      setTimeout(() => icon.classList.remove('animate'), 300);
    }

    // ==================== 搜索功能 ====================
    function performSearch() {
      const query = document.getElementById('searchInput').value;
      renderProducts(query);
    }
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') performSearch();
    });

    // ==================== 结算流程 ====================
    function openCheckout() {
      if (cart.length === 0) return;
      // 重置表单和错误信息
      document.getElementById('checkoutForm').reset();
      document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.error-input').forEach(el => el.classList.remove('error-input'));
      document.getElementById('successMessage').style.display = 'none';
      document.getElementById('checkoutForm').style.display = 'block';
      document.getElementById('checkoutModal').classList.add('active');
    }

    function closeCheckout() {
      document.getElementById('checkoutModal').classList.remove('active');
    }

    // 点击模态背景关闭
    document.getElementById('checkoutModal').addEventListener('click', function(e) {
      if (e.target === this) closeCheckout();
    });

    // ==================== 表单验证与提交（虚拟下单） ====================
    function validateCheckoutForm() {
      let isValid = true;
      // 清除之前的错误
      document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.error-input').forEach(el => el.classList.remove('error-input'));

      // 必填字段：firstName, lastName, address, city, phone
      const requiredFields = [
        { id: 'firstName', errorId: 'firstNameError' },
        { id: 'lastName', errorId: 'lastNameError' },
        { id: 'address', errorId: 'addressError' },
        { id: 'city', errorId: 'cityError' },
        { id: 'phone', errorId: 'phoneError' }
      ];

      requiredFields.forEach(field => {
        const input = document.getElementById(field.id);
        const value = input.value.trim();
        if (!value) {
          document.getElementById(field.errorId).style.display = 'block';
          input.classList.add('error-input');
          isValid = false;
        }
      });

      // 简单的电话格式验证（必须包含数字）
      const phone = document.getElementById('phone').value.trim();
      if (phone && !/^[0-9+\-\s()]+$/.test(phone)) {
        document.getElementById('phoneError').textContent = '电话号码格式不正确';
        document.getElementById('phoneError').style.display = 'block';
        document.getElementById('phone').classList.add('error-input');
        isValid = false;
      } else {
        document.getElementById('phoneError').textContent = '请输入有效电话号码';
      }

      // 信用卡演示验证（可选）
      const cardNumber = document.getElementById('cardNumber').value.trim();
      if (cardNumber && !/^[0-9\s]{13,19}$/.test(cardNumber.replace(/\s/g, ''))) {
        document.getElementById('cardError').style.display = 'block';
        document.getElementById('cardNumber').classList.add('error-input');
        isValid = false;
      }

      return isValid;
    }

    function submitOrder() {
      if (!validateCheckoutForm()) return;

      // 获取并净化用户输入（防范XSS：转义后再使用）
      const rawFirstName = document.getElementById('firstName').value;
      const rawLastName = document.getElementById('lastName').value;
      const rawAddress = document.getElementById('address').value;
      const rawCity = document.getElementById('city').value;
      const rawZip = document.getElementById('zip').value;
      const rawPhone = document.getElementById('phone').value;

      // 安全净化：移除潜在危险字符（演示客户端过滤）
      const firstName = sanitizeInput(rawFirstName.trim());
      const lastName = sanitizeInput(rawLastName.trim());
      const address = sanitizeInput(rawAddress.trim());
      const city = sanitizeInput(rawCity.trim());
      const zip = sanitizeInput(rawZip.trim());
      const phone = sanitizeInput(rawPhone.trim());

      // 构建订单摘要（使用净化后的数据）
      const totalPrice = cart.reduce((sum, item) => sum + item.price * item.quantity, 0).toFixed(2);
      const itemList = cart.map(item => `${escapeHtml(item.title)} x ${item.quantity}`).join(', ');
      
      // 使用textContent设置，完全避免XSS
      const orderSummaryEl = document.getElementById('orderSummary');
      orderSummaryEl.innerHTML = ''; // 清空
      const summaryText = `感谢您的订购，${firstName} ${lastName}！\n` +
                          `商品：${itemList}\n` +
                          `总金额：¥${totalPrice}\n` +
                          `配送至：${address}, ${city} ${zip}\n` +
                          `联系电话：${phone}\n` +
                          `(此为虚拟订单，不会实际扣款或发货)`;
      // 安全地显示文本（使用textContent）
      const pre = document.createElement('pre');
      pre.style.textAlign = 'left';
      pre.style.background = '#f8f9fa';
      pre.style.padding = '15px';
      pre.style.borderRadius = '8px';
      pre.style.whiteSpace = 'pre-wrap';
      pre.style.fontSize = '14px';
      pre.textContent = summaryText; // 关键：使用textContent，杜绝HTML注入
      orderSummaryEl.appendChild(pre);

      // 隐藏表单，显示成功消息
      document.getElementById('checkoutForm').style.display = 'none';
      document.getElementById('successMessage').style.display = 'block';

      // 清空购物车（模拟下单后清空）
      cart = [];
      updateCartUI();
    }

    // ==================== 初始化页面 ====================
    function init() {
      renderProducts();
      updateCartUI();
      // 购物车图标点击滚动到侧边栏
      document.getElementById('cartIcon').addEventListener('click', function() {
        document.getElementById('cartSidebar').scrollIntoView({ behavior: 'smooth' });
      });
    }

    // 页面加载完成后初始化
    window.addEventListener('DOMContentLoaded', init);

    // 额外安全措施：防止通过浏览器控制台修改关键函数（演示用，实际不可完全依赖）
    // 所有用户输入在显示前都经过escapeHtml或textContent处理。
    console.log('🔒 安全提示：此页面启用了CSP、输入净化与输出编码，防范XSS与点击劫持。');
  </script>
